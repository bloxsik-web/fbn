<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBN - Firefy Broadcasting Network</title>
    <link rel="stylesheet" href="value.css">
</head>
<body>
    <footer class="ftr">
        <div class="logo">
            <img src="bin/img/logo.png" alt="logo" class="logos">

            <div class="logo-text">
                <h3>FBN</h3>
                <p>Firefy Broadcasting Network</p>
            </div>
        </div>

        <div class="nav">
            <button onclick="window.location.href='index.html'">Новости</button>
            <button onclick="window.location.href='weather.html'">Погода</button>
            <button onclick="window.location.href='value.html'">Курс валют</button>
        </div>
    </footer>

    <h1 class="news-t">Курс валют</h1>

    <div id="rates" class="rates">Загрузка курса...</div>

    <script>
    async function loadRates() {
        const ratesBlock = document.getElementById('rates');

        try {
            const response = await fetch('https://open.er-api.com/v6/latest/RUB');
            const data = await response.json();

            if (data.result !== 'success') {
                throw new Error('Не удалось получить курс');
            }

            const usd = 1 / data.rates.USD;
            const eur = 1 / data.rates.EUR;
            const kzt = 1 / data.rates.KZT;
            const uah = 1 / data.rates.UAH;

            ratesBlock.innerHTML = `
                <div class="rate">Доллар (USD): ${usd.toFixed(4)} ₽</div>
                <div class="rate">Евро (EUR): ${eur.toFixed(4)} ₽</div>
                <div class="rate">Тенге (KZT): ${kzt.toFixed(4)} ₽</div>
                <div class="rate">Гривна (UAH): ${uah.toFixed(4)} ₽</div>
            `;
        } catch (error) {
            ratesBlock.innerHTML = `<div class="rate">Ошибка загрузки курса</div>`;
            console.error(error);
        }
    }

    loadRates();
</script>
</body>
</html>
